# Raspberry Pi GPIO JTAG config for ESP32-S3 using direct header wiring.

source [find interface/raspberrypi-native.cfg]

transport select jtag

# Wiring supplied by the user:
# ESP32-S3 GPIO39 (MTCK) -> Pi GPIO11 (pin 23)
# ESP32-S3 GPIO42 (MTMS) -> Pi GPIO7  (pin 26)
# ESP32-S3 GPIO41 (MTDI) -> Pi GPIO25 (pin 22)
# ESP32-S3 GPIO40 (MTDO) -> Pi GPIO24 (pin 18)
adapter gpio tck 11
adapter gpio tms 7
adapter gpio tdi 25
adapter gpio tdo 24

# Start slow to maximize the chance of first attach on jumper wires.
adapter speed 100

set ESP32_S3_ONLYCPU 1

source [find target/esp32s3.cfg]
